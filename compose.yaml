name: twi

x-twi: &twi
  build:
    context: .
  image: twi:local
  environment:
    TERM: ${TERM:-xterm-256color}
    TWI_ENABLE_KITTY_IMAGES: ${TWI_ENABLE_KITTY_IMAGES:-true}
    TWI_IMAGE_MODE: ${TWI_IMAGE_MODE:-auto}
    TWI_AVATAR_MODE: ${TWI_AVATAR_MODE:-initials}
    TWI_EMOJI_MODE: ${TWI_EMOJI_MODE:-unicode}
    TWI_EMOTE_MODE: ${TWI_EMOTE_MODE:-text}
    TWI_ANIMATION_MODE: ${TWI_ANIMATION_MODE:-fast}

services:
  mock:
    <<: *twi
    command: ["chat", "--mock", "--channel", "${TWITCH_CHANNEL:-demo}"]
    stdin_open: true
    tty: true

  live:
    <<: *twi
    command: ["chat", "--channel", "${TWITCH_CHANNEL:-demo}"]
    env_file:
      - path: .env
        required: false
    environment:
      TERM: ${TERM:-xterm-256color}
      TWI_ENABLE_KITTY_IMAGES: ${TWI_ENABLE_KITTY_IMAGES:-true}
      TWI_IMAGE_MODE: ${TWI_IMAGE_MODE:-auto}
      TWI_AVATAR_MODE: ${TWI_AVATAR_MODE:-initials}
      TWI_EMOJI_MODE: ${TWI_EMOJI_MODE:-unicode}
      TWI_EMOTE_MODE: ${TWI_EMOTE_MODE:-text}
      TWI_ANIMATION_MODE: ${TWI_ANIMATION_MODE:-fast}
    stdin_open: true
    tty: true

  doctor:
    <<: *twi
    command: ["doctor"]
